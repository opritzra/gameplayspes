<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Portrait</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: Verdana, Tahoma, "Segoe UI", sans-serif;
      color: #edf6ff;
      background:
        radial-gradient(circle at 50% 12%, rgba(16, 137, 255, 0.18), transparent 24%),
        linear-gradient(180deg, #03111f 0%, #01060e 100%);
    }

    .page {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
    }

    .shell {
      position: relative;
      width: min(1840px, 100%);
      padding: 30px 30px 36px;
      border-radius: 40px;
      border: 3px solid rgba(20, 130, 242, 0.92);
      background:
        radial-gradient(circle at 50% 35%, rgba(40, 116, 255, 0.1), transparent 42%),
        linear-gradient(180deg, #0a2254 0%, #071a41 60%, #05122d 100%);
      box-shadow:
        inset 0 0 0 1px rgba(119, 189, 255, 0.18),
        inset 0 -80px 140px rgba(1, 6, 18, 0.28),
        0 24px 60px rgba(0, 0, 0, 0.42);
      overflow: hidden;
    }

    .shell::before,
    .shell::after {
      content: "";
      position: absolute;
      inset: 24px;
      border-radius: 30px;
      pointer-events: none;
    }

    .shell::before {
      border: 2px solid rgba(40, 154, 255, 0.54);
      box-shadow: inset 0 0 24px rgba(46, 136, 255, 0.08);
    }

    .shell::after {
      inset: 10px;
      border-radius: 34px;
      border: 1px solid rgba(44, 116, 211, 0.24);
    }

    .bg-hex,
    .bg-hex::before,
    .bg-hex::after {
      position: absolute;
      width: 34px;
      height: 38px;
      clip-path: polygon(50% 0, 100% 25%, 100% 75%, 50% 100%, 0 75%, 0 25%);
      border: 2px solid rgba(42, 141, 255, 0.32);
    }

    .bg-hex {
      left: 28px;
      top: 340px;
    }

    .bg-hex::before,
    .bg-hex::after {
      content: "";
      left: -18px;
    }

    .bg-hex::before {
      top: -62px;
    }

    .bg-hex::after {
      top: 62px;
    }

    .bg-hex-right {
      position: absolute;
      right: 26px;
      top: 485px;
      width: 34px;
      height: 38px;
      clip-path: polygon(50% 0, 100% 25%, 100% 75%, 50% 100%, 0 75%, 0 25%);
      border: 2px solid rgba(42, 141, 255, 0.32);
    }

    .top {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 520px 1fr;
      gap: 34px;
      align-items: center;
    }

    .portrait-wrap {
      position: relative;
      min-height: 470px;
      display: grid;
      place-items: center;
    }

    .portrait-ring {
      position: relative;
      width: 430px;
      height: 430px;
      border-radius: 50%;
      border: 6px solid #2ab3ff;
      background:
        radial-gradient(circle at 50% 38%, rgba(67, 156, 255, 0.24), rgba(8, 35, 88, 0.96) 68%),
        linear-gradient(180deg, #113272, #0a1f4d);
      box-shadow:
        inset 0 0 0 6px rgba(116, 184, 255, 0.14),
        0 0 0 10px rgba(25, 94, 196, 0.14),
        0 0 24px rgba(41, 171, 255, 0.18);
      overflow: visible;
    }

    .portrait-ring::before {
      content: "";
      position: absolute;
      inset: -14px;
      border-radius: 50%;
      border: 8px solid transparent;
      border-top-color: #29c0ff;
      border-right-color: #2089ff;
      border-left-color: rgba(54, 131, 255, 0.34);
      border-bottom-color: rgba(54, 131, 255, 0.34);
      transform: rotate(10deg);
    }

    .portrait-ring::after {
      content: "";
      position: absolute;
      inset: -22px;
      border-radius: 50%;
      border: 4px solid transparent;
      border-right-color: rgba(25, 147, 255, 0.42);
      border-bottom-color: rgba(25, 147, 255, 0.42);
      transform: rotate(32deg);
    }

    .portrait-inner {
      position: absolute;
      inset: 16px;
      border-radius: 50%;
      overflow: hidden;
      background:
        radial-gradient(circle at 78% 18%, #ffe382 0 12%, #ffd24d 13% 18%, transparent 19%),
        linear-gradient(180deg, #ffffff 0%, #f8fbff 34%, #d5eeff 70%, #acd7ff 100%);
    }

    .portrait-inner::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 74% 58%, #7fcffa 0 8%, #58afd8 9% 15%, transparent 16%),
        radial-gradient(circle at 87% 62%, #7fcffa 0 8%, #58afd8 9% 15%, transparent 16%),
        radial-gradient(circle at 87% 76%, #7fcffa 0 8%, #58afd8 9% 15%, transparent 16%),
        radial-gradient(circle at 8% 42%, rgba(255, 214, 148, 0.9) 0 2%, transparent 3%),
        radial-gradient(circle at 18% 30%, rgba(255, 214, 148, 0.9) 0 2%, transparent 3%),
        radial-gradient(circle at 64% 22%, rgba(255, 214, 148, 0.9) 0 2%, transparent 3%);
      opacity: 0.95;
    }

    .hair-back,
    .face,
    .ear,
    .neck,
    .shirt,
    .hood,
    .beret,
    .bang,
    .eye,
    .mouth,
    .creature {
      position: absolute;
    }

    .hair-back {
      left: 92px;
      top: 96px;
      width: 186px;
      height: 210px;
      border-radius: 46% 54% 42% 44%;
      background: linear-gradient(180deg, #bc6b38, #88401d);
      box-shadow:
        -20px 54px 0 -18px #9d4e28,
        18px 70px 0 -22px #9d4e28;
    }

    .face {
      left: 128px;
      top: 142px;
      width: 128px;
      height: 160px;
      border-radius: 44% 44% 42% 42%;
      background: linear-gradient(180deg, #ffe7d0, #ffcda8);
      box-shadow:
        inset 0 -14px 0 rgba(217, 130, 68, 0.1),
        -12px 32px 0 -10px #ffd8ba;
    }

    .ear {
      left: 248px;
      top: 208px;
      width: 24px;
      height: 38px;
      border-radius: 50%;
      background: #ffcda8;
    }

    .neck {
      left: 176px;
      top: 286px;
      width: 34px;
      height: 32px;
      background: #ffc49a;
      border-radius: 0 0 14px 14px;
    }

    .shirt {
      left: 112px;
      bottom: 18px;
      width: 176px;
      height: 128px;
      border-radius: 30px 30px 0 0;
      background: linear-gradient(180deg, #f4f1f6, #ccb3c4 70%, #8e6d84 100%);
      transform: rotate(-10deg);
    }

    .hood {
      left: 82px;
      bottom: 8px;
      width: 174px;
      height: 116px;
      border-radius: 40px 40px 0 0;
      background: linear-gradient(180deg, #8a5ab3, #4b296f);
      transform: rotate(12deg);
    }

    .beret {
      left: 76px;
      top: 54px;
      width: 190px;
      height: 98px;
      border-radius: 62% 46% 30% 52%;
      background: linear-gradient(180deg, #66862b, #3d531b);
      transform: rotate(10deg);
      box-shadow:
        inset 0 -10px 0 rgba(27, 44, 12, 0.18),
        28px -8px 0 -16px #7ca339;
    }

    .bang {
      left: 128px;
      top: 114px;
      width: 120px;
      height: 76px;
      border-radius: 20px 20px 34px 28px;
      background: linear-gradient(180deg, #ba6e3d, #8a4421);
      transform: rotate(8deg);
      box-shadow:
        -34px -14px 0 -16px #a75f34,
        18px 8px 0 -10px #a55a2f;
    }

    .eye {
      top: 204px;
      width: 28px;
      height: 40px;
      border-radius: 45% 45% 50% 50%;
      background: #ffffff;
      box-shadow: inset 0 -8px 0 rgba(207, 142, 88, 0.08);
    }

    .eye.left {
      left: 148px;
    }

    .eye.right {
      left: 210px;
    }

    .eye::before {
      content: "";
      position: absolute;
      inset: 8px 6px 6px;
      border-radius: 50%;
      background: radial-gradient(circle at 52% 40%, #ffd77a 0 16%, #8d431f 17% 54%, #281f2f 55% 100%);
    }

    .mouth {
      left: 205px;
      top: 266px;
      width: 18px;
      height: 10px;
      border-bottom: 4px solid #b75442;
      border-radius: 0 0 16px 16px;
      transform: rotate(-16deg);
    }

    .creature {
      right: 18px;
      bottom: 34px;
      width: 112px;
      height: 138px;
      border-radius: 46% 46% 44% 44%;
      background: linear-gradient(180deg, #8ae9ff, #4da9d7);
      box-shadow:
        -28px -18px 0 -18px #95ecff,
        18px -18px 0 -18px #95ecff,
        inset 0 -14px 0 rgba(33, 119, 165, 0.18);
    }

    .creature::before,
    .creature::after {
      content: "";
      position: absolute;
      top: 44px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #21415d;
    }

    .creature::before {
      left: 28px;
    }

    .creature::after {
      right: 28px;
    }

    .level-badge {
      position: absolute;
      left: 118px;
      bottom: -28px;
      width: 140px;
      height: 158px;
      display: grid;
      place-items: center;
      color: #f2f7ff;
      font-size: 3.9rem;
      font-weight: 700;
      letter-spacing: -0.04em;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.24);
    }

    .level-badge::before,
    .level-badge::after {
      content: "";
      position: absolute;
      inset: 0;
      clip-path: polygon(50% 0, 90% 22%, 90% 74%, 50% 100%, 10% 74%, 10% 22%);
    }

    .level-badge::before {
      background: linear-gradient(180deg, #0d3575, #061a42);
      border: 4px solid #2eb8ff;
      box-shadow: 0 0 16px rgba(46, 184, 255, 0.18);
    }

    .level-badge::after {
      inset: 10px;
      border: 3px solid rgba(110, 191, 255, 0.38);
      background: transparent;
    }

    .level-badge span {
      position: relative;
      z-index: 1;
    }

    .info {
      min-width: 0;
      padding-right: 28px;
    }

    .name-row {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 22px;
    }

    .name-row h1 {
      margin: 0;
      font-size: clamp(3rem, 4.5vw, 4.7rem);
      line-height: 1;
      font-weight: 700;
      letter-spacing: -0.04em;
      text-shadow: 0 3px 10px rgba(0, 0, 0, 0.28);
    }

    .shield {
      position: relative;
      width: 56px;
      height: 64px;
      clip-path: polygon(50% 0, 92% 14%, 92% 58%, 50% 100%, 8% 58%, 8% 14%);
      border: 3px solid #39c4ff;
      background: linear-gradient(180deg, rgba(12, 58, 126, 0.95), rgba(8, 29, 74, 0.96));
      box-shadow: 0 0 14px rgba(57, 196, 255, 0.16);
    }

    .shield::before {
      content: "";
      position: absolute;
      inset: 14px;
      background: linear-gradient(180deg, #67e6ff, #2bb0ff);
      clip-path: polygon(50% 0, 62% 36%, 100% 50%, 62% 64%, 50% 100%, 38% 64%, 0 50%, 38% 36%);
    }

    .ornament-line {
      position: relative;
      height: 26px;
      margin-bottom: 28px;
    }

    .ornament-line::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 12px;
      height: 2px;
      background: linear-gradient(90deg, rgba(46, 189, 255, 0.16), rgba(46, 189, 255, 0.82) 34%, rgba(46, 189, 255, 0.38) 100%);
    }

    .ornament-line::after {
      content: "";
      position: absolute;
      left: 33%;
      top: 4px;
      width: 18px;
      height: 18px;
      background: #32d2ff;
      transform: rotate(45deg);
      box-shadow: 0 0 12px rgba(50, 210, 255, 0.18);
    }

    .stats {
      border-radius: 28px;
      border: 2px solid rgba(34, 129, 241, 0.64);
      background: linear-gradient(180deg, rgba(9, 37, 87, 0.92), rgba(6, 24, 62, 0.96));
      box-shadow: inset 0 0 0 1px rgba(121, 190, 255, 0.06);
      overflow: hidden;
    }

    .stat-row {
      display: grid;
      grid-template-columns: 150px 1fr 220px;
      align-items: center;
      gap: 18px;
      min-height: 96px;
      padding: 0 28px;
    }

    .stat-row + .stat-row {
      border-top: 2px solid rgba(55, 144, 246, 0.18);
    }

    .stat-label {
      display: flex;
      align-items: center;
      gap: 18px;
      font-size: 1.1rem;
      font-weight: 700;
      color: #eef6ff;
    }

    .icon {
      width: 44px;
      height: 44px;
      position: relative;
      flex: 0 0 auto;
    }

    .icon.heart::before,
    .icon.star::before,
    .icon.fish::before,
    .icon.bolt::before {
      content: "";
      position: absolute;
      inset: 0;
      margin: auto;
    }

    .icon.heart::before {
      width: 28px;
      height: 24px;
      background: linear-gradient(180deg, #ff77a6, #ff2b6d);
      transform: rotate(-45deg);
      border-radius: 8px 8px 2px 2px;
      top: 10px;
      left: 8px;
      box-shadow:
        12px -12px 0 0 #ff5d93,
        0 -12px 0 0 #ff5d93;
    }

    .icon.star::before {
      width: 32px;
      height: 32px;
      background: linear-gradient(180deg, #59deff, #2f8dff);
      clip-path: polygon(50% 0, 62% 36%, 100% 50%, 62% 64%, 50% 100%, 38% 64%, 0 50%, 38% 36%);
    }

    .icon.fish::before {
      width: 32px;
      height: 20px;
      background: linear-gradient(180deg, #8df28b, #44c36c);
      border-radius: 60% 44% 52% 60%;
      transform: rotate(-12deg);
    }

    .icon.fish::after {
      content: "";
      position: absolute;
      right: 4px;
      top: 13px;
      width: 14px;
      height: 14px;
      background: linear-gradient(180deg, #8df28b, #44c36c);
      clip-path: polygon(0 50%, 100% 0, 100% 100%);
    }

    .icon.bolt::before {
      width: 24px;
      height: 40px;
      background: linear-gradient(180deg, #ffd44c, #ffb21d);
      clip-path: polygon(44% 0, 100% 0, 64% 48%, 88% 48%, 24% 100%, 42% 58%, 10% 58%);
    }

    .track {
      height: 44px;
      padding: 4px;
      border-radius: 14px;
      border: 2px solid rgba(28, 116, 223, 0.72);
      background: linear-gradient(180deg, rgba(5, 24, 60, 0.96), rgba(4, 17, 45, 0.98));
      box-shadow: inset 0 0 0 1px rgba(100, 175, 255, 0.05);
    }

    .fill {
      position: relative;
      height: 100%;
      border-radius: 10px;
    }

    .fill::after {
      content: "";
      position: absolute;
      right: 22px;
      top: 8px;
      width: 18px;
      height: 16px;
      border-left: 3px solid rgba(19, 41, 86, 0.7);
      border-right: 3px solid rgba(19, 41, 86, 0.7);
      transform: skew(-26deg);
    }

    .fill.hp {
      width: 68%;
      background: linear-gradient(180deg, #ff6796, #ff2d71);
    }

    .fill.exp {
      width: 47%;
      background: linear-gradient(180deg, #2eb2ff, #1b63ff);
    }

    .fill.fish {
      width: 54%;
      background: linear-gradient(180deg, #7cee83, #40c66f);
    }

    .fill.stm {
      width: 77%;
      background: linear-gradient(180deg, #ffd24f, #f8a611);
    }

    .stat-value {
      text-align: right;
      font-size: 1rem;
      font-weight: 700;
      color: #f0f7ff;
      letter-spacing: 0.02em;
    }

    .divider {
      position: relative;
      height: 32px;
      margin: 22px 0 16px;
    }

    .divider::before {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 15px;
      height: 2px;
      background: linear-gradient(90deg, rgba(42, 178, 255, 0.75), rgba(42, 178, 255, 0.18) 50%, rgba(42, 178, 255, 0.75));
    }

    .divider::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 0;
      width: 30px;
      height: 30px;
      background: #0a2254;
      border-right: 4px solid #1e97ff;
      border-bottom: 4px solid #1e97ff;
      transform: translateX(-50%) rotate(45deg);
      box-shadow: 0 0 12px rgba(30, 151, 255, 0.16);
    }

    .cards {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1.4fr 0.9fr 1fr 1.1fr;
      gap: 22px;
    }

    .card {
      position: relative;
      min-height: 172px;
      padding: 18px 22px;
      border-radius: 24px;
      border: 2px solid rgba(26, 132, 244, 0.72);
      background:
        radial-gradient(circle at 50% 35%, rgba(22, 122, 232, 0.08), transparent 44%),
        linear-gradient(180deg, rgba(10, 40, 93, 0.95), rgba(5, 24, 59, 0.96));
      box-shadow:
        inset 0 0 0 1px rgba(111, 184, 255, 0.06),
        inset 0 -24px 44px rgba(1, 10, 24, 0.18);
      overflow: hidden;
    }

    .card::before,
    .card::after {
      content: "";
      position: absolute;
      width: 18px;
      height: 18px;
      border-top: 4px solid #20c5ff;
      border-left: 4px solid #20c5ff;
      top: 10px;
      left: 10px;
      opacity: 0.8;
    }

    .card::after {
      top: auto;
      left: auto;
      right: 10px;
      bottom: 10px;
      border-top: 0;
      border-left: 0;
      border-right: 4px solid #20c5ff;
      border-bottom: 4px solid #20c5ff;
    }

    .pokeball-crest {
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 66px;
      height: 34px;
      border-radius: 0 0 34px 34px;
      border: 3px solid #2dc8ff;
      border-top: 0;
      background: linear-gradient(180deg, rgba(7, 31, 75, 0.96), rgba(10, 46, 114, 0.96));
      box-shadow: 0 0 16px rgba(45, 200, 255, 0.16);
    }

    .pokeball-crest::before,
    .pokeball-crest::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 9px;
      transform: translateX(-50%);
      border-radius: 50%;
    }

    .pokeball-crest::before {
      width: 32px;
      height: 6px;
      background: #2dc8ff;
    }

    .pokeball-crest::after {
      width: 16px;
      height: 16px;
      background: #edf6ff;
      border: 4px solid #2dc8ff;
    }

    .pokeball-list {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding-top: 18px;
    }

    .pokeball {
      position: relative;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: linear-gradient(180deg, #fd5a59 0 50%, #f4f6ff 50% 100%);
      border: 4px solid #1d2a4e;
      box-shadow:
        0 4px 8px rgba(0, 0, 0, 0.18),
        inset 0 -4px 0 rgba(0, 0, 0, 0.08);
    }

    .pokeball::before,
    .pokeball::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

    .pokeball::before {
      width: 72px;
      height: 8px;
      background: #1d2a4e;
    }

    .pokeball::after {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #f4f6ff;
      border: 5px solid #1d2a4e;
    }

    .mini-content {
      height: 100%;
      display: flex;
      align-items: center;
      gap: 18px;
      justify-content: center;
    }

    .mini-icon-hex {
      position: relative;
      width: 108px;
      height: 124px;
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      color: #fff;
    }

    .mini-icon-hex::before,
    .mini-icon-hex::after {
      content: "";
      position: absolute;
      inset: 0;
      clip-path: polygon(50% 0, 92% 22%, 92% 78%, 50% 100%, 8% 78%, 8% 22%);
    }

    .mini-icon-hex::before {
      background: linear-gradient(180deg, rgba(12, 58, 126, 0.95), rgba(7, 28, 72, 0.96));
      border: 3px solid #2eb8ff;
    }

    .mini-icon-hex::after {
      inset: 10px;
      border: 2px solid rgba(110, 191, 255, 0.24);
      background: transparent;
    }

    .trophy,
    .ball-badge,
    .amulet {
      position: relative;
      z-index: 1;
    }

    .trophy {
      width: 56px;
      height: 68px;
    }

    .trophy::before {
      content: "";
      position: absolute;
      left: 12px;
      top: 8px;
      width: 32px;
      height: 28px;
      border: 4px solid #ffcb42;
      border-bottom-width: 10px;
      border-radius: 0 0 14px 14px;
      background: linear-gradient(180deg, #ffe27a, #f2b720);
      box-shadow:
        -14px 8px 0 -10px #ffcb42,
        14px 8px 0 -10px #ffcb42;
    }

    .trophy::after {
      content: "";
      position: absolute;
      left: 22px;
      bottom: 4px;
      width: 12px;
      height: 22px;
      background: #eab129;
      box-shadow:
        -10px 16px 0 2px #c98f19,
        10px 16px 0 2px #c98f19;
    }

    .ball-badge {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: linear-gradient(180deg, #fd5a59 0 50%, #f4f6ff 50% 100%);
      border: 4px solid #203156;
    }

    .ball-badge::before,
    .ball-badge::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

    .ball-badge::before {
      width: 70px;
      height: 8px;
      background: #203156;
    }

    .ball-badge::after {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: #f4f6ff;
      border: 5px solid #203156;
    }

    .card-copy {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
    }

    .card-copy small {
      color: #58b7ff;
      font-size: 1rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .card-copy strong {
      font-size: clamp(2.3rem, 4vw, 4rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .amulet-card {
      display: flex;
      align-items: center;
      gap: 18px;
      justify-content: flex-start;
    }

    .amulet-box {
      width: 92px;
      height: 116px;
      border-radius: 26px;
      background: linear-gradient(180deg, rgba(10, 46, 102, 0.96), rgba(5, 23, 57, 0.98));
      border: 2px solid rgba(36, 140, 244, 0.62);
      display: grid;
      place-items: center;
      box-shadow: inset 0 0 0 1px rgba(104, 185, 255, 0.06);
    }

    .amulet {
      width: 54px;
      height: 78px;
    }

    .amulet::before {
      content: "";
      position: absolute;
      left: 50%;
      top: -4px;
      transform: translateX(-50%);
      width: 24px;
      height: 24px;
      border: 4px solid #8de9ff;
      border-radius: 50%;
      opacity: 0.6;
    }

    .amulet::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 24px;
      transform: translateX(-50%);
      width: 50px;
      height: 50px;
      clip-path: polygon(50% 0, 84% 16%, 100% 50%, 84% 84%, 50% 100%, 16% 84%, 0 50%, 16% 16%);
      background: radial-gradient(circle at 50% 40%, #bfffff 0 18%, #45d9ff 19% 46%, #115f93 47% 100%);
      box-shadow:
        inset 0 0 0 4px rgba(199, 248, 255, 0.35),
        0 0 14px rgba(64, 205, 255, 0.22);
    }

    .amulet-copy {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex: 1;
      gap: 16px;
      color: #76bbff;
      font-size: 1.2rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .arrow {
      width: 18px;
      height: 18px;
      border-top: 4px solid #78bdff;
      border-right: 4px solid #78bdff;
      transform: rotate(45deg);
      flex: 0 0 auto;
    }

    @media (max-width: 1420px) {
      .top {
        grid-template-columns: 1fr;
      }

      .cards {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .portrait-wrap {
        min-height: auto;
        padding-top: 10px;
      }

      .info {
        padding-right: 0;
      }
    }

    @media (max-width: 900px) {
      .shell {
        padding: 18px;
      }

      .stat-row {
        grid-template-columns: 120px 1fr;
      }

      .stat-value {
        grid-column: 2;
        text-align: left;
      }

      .cards {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .portrait-ring {
        width: 300px;
        height: 300px;
      }

      .portrait-wrap {
        transform: scale(0.8);
        transform-origin: top center;
      }

      .name-row h1 {
        font-size: 2.4rem;
      }

      .stat-row {
        padding: 14px 16px;
      }

      .pokeball-list {
        flex-wrap: wrap;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="shell">
      <div class="bg-hex"></div>
      <div class="bg-hex-right"></div>

      <div class="top">
        <div class="portrait-wrap">
          <div class="portrait-ring">
            <div class="portrait-inner">
              <div class="hair-back"></div>
              <div class="face"></div>
              <div class="ear"></div>
              <div class="neck"></div>
              <div class="shirt"></div>
              <div class="hood"></div>
              <div class="beret"></div>
              <div class="bang"></div>
              <div class="eye left"></div>
              <div class="eye right"></div>
              <div class="mouth"></div>
              <div class="creature"></div>
            </div>
            <div class="level-badge"><span>150</span></div>
          </div>
        </div>

        <div class="info">
          <div class="name-row">
            <h1>[ADM] Amir El Amari</h1>
            <div class="shield"></div>
          </div>

          <div class="ornament-line"></div>

          <div class="stats">
            <div class="stat-row">
              <div class="stat-label"><span class="icon heart"></span> HP</div>
              <div class="track"><div class="fill hp"></div></div>
              <div class="stat-value">8725 / 8725</div>
            </div>

            <div class="stat-row">
              <div class="stat-label"><span class="icon star"></span> EXP</div>
              <div class="track"><div class="fill exp"></div></div>
              <div class="stat-value">34,680 / 76,000</div>
            </div>

            <div class="stat-row">
              <div class="stat-label"><span class="icon fish"></span> FISH</div>
              <div class="track"><div class="fill fish"></div></div>
              <div class="stat-value">420 / 800</div>
            </div>

            <div class="stat-row">
              <div class="stat-label"><span class="icon bolt"></span> STM</div>
              <div class="track"><div class="fill stm"></div></div>
              <div class="stat-value">160 / 200</div>
            </div>
          </div>
        </div>
      </div>

      <div class="divider"></div>

      <div class="cards">
        <article class="card">
          <div class="pokeball-crest"></div>
          <div class="pokeball-list">
            <span class="pokeball"></span>
            <span class="pokeball"></span>
            <span class="pokeball"></span>
            <span class="pokeball"></span>
            <span class="pokeball"></span>
          </div>
        </article>

        <article class="card">
          <div class="mini-content">
            <div class="mini-icon-hex"><span class="trophy"></span></div>
            <div class="card-copy">
              <small>TORNEIOS</small>
              <strong>500</strong>
            </div>
          </div>
        </article>

        <article class="card">
          <div class="mini-content">
            <div class="mini-icon-hex"><span class="ball-badge"></span></div>
            <div class="card-copy">
              <small>CAPTURAS</small>
              <strong>1500</strong>
            </div>
          </div>
        </article>

        <article class="card">
          <div class="amulet-card">
            <div class="amulet-box"><span class="amulet"></span></div>
            <div class="amulet-copy">
              <span>AMULETOS</span>
              <span class="arrow"></span>
            </div>
          </div>
        </article>
      </div>
    </section>
  </main>
</body>
</html>
